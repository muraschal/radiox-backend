<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIVA - The Wedding Show | RadioX</title>
    <style>
        body { background: linear-gradient(135deg, #1a1a1a, #2d2d2d); color: white; font-family: system-ui; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .cover { text-align: center; margin: 20px 0; }
        .cover img { max-width: 400px; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
        .player { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 30px; margin: 30px 0; }
        .title { font-size: 2.5em; font-weight: bold; text-align: center; margin: 30px 0; background: linear-gradient(45deg, #ff6b6b, #ffd93d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: #ccc; margin-bottom: 40px; font-size: 1.2em; }
        audio { width: 100%; height: 60px; }
        .hearts { text-align: center; font-size: 3em; margin: 30px 0; animation: pulse 2s infinite; }
        .message { text-align: center; margin: 40px 0; color: #ddd; font-style: italic; font-size: 1.1em; }
        @keyframes pulse { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">RIVA - The Wedding Show</div>
        <div class="subtitle">Special Edition • Mallorca • Vanessa ❤️ Richard</div>
        <div class="hearts">💒 🥂 💍</div>
        
        <div class="cover">
            <img src="radiox_250615_1449.png" alt="RIVA Wedding Magazine Cover">
        </div>
        
        <div class="player">
            <audio controls autoplay>
                <source src="radiox_250615_1449.mp3" type="audio/mpeg">
                Dein Browser unterstützt keine Audio-Wiedergabe.
            </audio>
        </div>
        
        <div class="message">
            <p>"Weil Liebe immer gewinnt - auch wenn sie manchmal 15 Jahre braucht, um das System zu debuggen."</p>
            <p><strong>Prost auf Vanessa und Richard!</strong></p>
        </div>
        
        <div style="text-align: center; margin: 40px 0; color: #888; font-size: 0.9em;">
            <p>Live aus Mallorca • RadioX Special Edition</p>
            <p>Generated with ❤️ for the perfect couple</p>
        </div>
    </div>
</body>
</html>
